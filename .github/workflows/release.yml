name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    container:
      image: alpine:3.23
    steps:
      - uses: actions/checkout@v5

      - name: Install build tools
        run: apk add --no-cache build-base make file binutils

      - name: Build static binaries
        run: make clean all CC=gcc CFLAGS="-O2 -fno-pie" LDFLAGS="-static -no-pie"

      - name: Verify static
        run: |
          for bin in build/stb-noise build/stb-atlas build/stb-img; do
            file "$bin"
            file "$bin" | grep -q "statically linked"
            ! readelf -l "$bin" | grep -q INTERP
          done

      - name: Run tests
        run: make clean test

      - uses: actions/upload-artifact@v6
        with:
          name: stb-utils-linux-x86_64
          path: |
            build/stb-noise
            build/stb-atlas
            build/stb-img

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build binaries
        run: make clean all

      - name: Run tests
        run: make clean test

      - uses: actions/upload-artifact@v6
        with:
          name: stb-utils-macos-arm64
          path: |
            build/stb-noise
            build/stb-atlas
            build/stb-img

  release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Rename and organize binaries
        run: |
          mkdir -p release_binaries
          mv artifacts/stb-utils-linux-x86_64/stb-noise release_binaries/stb-noise-linux-x86_64
          mv artifacts/stb-utils-linux-x86_64/stb-atlas release_binaries/stb-atlas-linux-x86_64
          mv artifacts/stb-utils-linux-x86_64/stb-img release_binaries/stb-img-linux-x86_64
          mv artifacts/stb-utils-macos-arm64/stb-noise release_binaries/stb-noise-macos-arm64
          mv artifacts/stb-utils-macos-arm64/stb-atlas release_binaries/stb-atlas-macos-arm64
          mv artifacts/stb-utils-macos-arm64/stb-img release_binaries/stb-img-macos-arm64
          chmod +x release_binaries/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_binaries/*
          generate_release_notes: true
